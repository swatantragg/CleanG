# Production nginx config with TLS termination + HTTP->HTTPS redirect.
#
# The default `nginx.conf` in this image serves the SPA over plain HTTP for local
# development. In production, mount THIS file over it instead and provide certs:
#
#   services:
#     frontend:
#       volumes:
#         - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
#         - /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
#         - /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem:/etc/nginx/certs/privkey.pem:ro
#       ports: ["80:80", "443:443"]
#
# Keep COOKIE_SECURE=true (the default) so session/CSRF cookies are only ever
# sent over TLS, and set TRUSTED_HOSTS / CORS_ORIGINS to your real domain.

# 1) Every plain-HTTP request is redirected to HTTPS (no app served over :80).
server {
    listen 80;
    server_name _;
    # ACME http-01 challenge files, if you renew certs in-place, can be served
    # from here; everything else is bounced to TLS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2) The real site, TLS only.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # Modern, safe defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;
    server_tokens off;

    # Security headers (defense-in-depth alongside the API).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Now genuinely enforced — the whole site is HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large exports (100k+ rows) stream for tens of seconds; the default 60s
        # read timeout would sever the download mid-flight. Buffering off so bytes
        # reach the client as the backend produces them.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
