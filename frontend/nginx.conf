server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Aligned with the backend's 20 MB upload cap.
    client_max_body_size 20m;

    # Don't leak the nginx version in responses.
    server_tokens off;

    # Security headers for the served SPA (defense-in-depth alongside the API).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Enforced once served behind TLS (ignored by browsers over plain HTTP).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API -> FastAPI backend (compose service name "backend").
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large exports (100k+ rows) stream for tens of seconds; the default 60s
        # read timeout would sever the download mid-flight. Buffering off so bytes
        # reach the client as the backend produces them.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Hashed assets -> long cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback -> BrowserRouter client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
