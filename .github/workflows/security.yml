name: security

# Dependency, code and secret scanning. Runs on every push/PR and weekly so a
# newly-disclosed CVE in a pinned dependency surfaces even without code changes.
on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  python-deps:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt --strict --desc

  node-deps:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit
        working-directory: frontend
        # Fail on high/critical advisories; ignore lower-severity noise.
        run: |
          npm ci --no-audit --no-fund
          npm audit --audit-level=high

  secrets:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
