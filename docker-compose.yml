# G-Cleanser stack: FastAPI backend + React/nginx frontend.
# The database is a managed Postgres (DATABASE_URL in backend/.env) shared by the team.
#   docker compose up --build
services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      # Mount the Google service-account key (read-only). Only used when
      # STORAGE_BACKEND=drive; harmless otherwise.
      - ./backend/secrets:/app/secrets:ro

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5174:80"
