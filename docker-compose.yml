services:
  backend:
    build: ./backend
    # Config comes from the deployment platform's environment (Coolify UI),
    # interpolated below. NOTE: backend/.env is gitignored and absent on a clean
    # clone, so it is deliberately NOT referenced here — relying on it would make
    # the deploy depend on a file the repo doesn't ship.
    environment:
      # --- Required (startup aborts if unset / placeholder / too short) ---
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # --- Bootstrap admin + token lifetime ---
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      # Frontend is served same-origin via nginx, but keep CORS explicit.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      # Keep true in production (HTTPS). Set COOKIE_SECURE=false only when
      # serving the app over plain HTTP from a non-localhost host.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # Host-header allowlist + shared rate-limit store (optional but recommended
      # in production). Defaults keep single-host / single-worker dev working.
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
      REDIS_URL: ${REDIS_URL:-}
      # --- Daily report email: SMTP connection only. Recipients + 10:30 IST
      # schedule are hardcoded in app/config.py. Delivery is skipped until the
      # SMTP details below are set. ---
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Printed on boot so the logs say where this service answers. Not published
      # to the host, so the only address that resolves is the compose-network one.
      SERVICE_URL: ${BACKEND_URL:-http://backend:8000}
    labels:
      app.url: "http://backend:8000 — internal only; reach it through the frontend at /api"
    # The API is NOT published to the host: it is reachable only on the internal
    # compose network, exclusively through the nginx reverse proxy (which adds the
    # CSP, the 20 MB upload cap and the served security headers). Publishing it
    # would let clients bypass all of those. `expose` keeps it container-internal.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      # The public address users hit. In production Traefik terminates TLS on the
      # app's FQDN, so set FRONTEND_URL to it (e.g. https://cleanser.example.in)
      # and the boot log will name it.
      SERVICE_URL: ${FRONTEND_URL:-http://localhost}
    labels:
      app.url: "${FRONTEND_URL:-http://localhost} — public entrypoint (SPA + /api proxy)"
    # Coolify's reverse proxy (Traefik) routes the app's FQDN to this container
    # on port 80. Do NOT publish a fixed host port — it conflicts with whatever
    # already holds the port on the host and bypasses the proxy / TLS.
    expose:
      - "80"
    restart: unless-stopped
